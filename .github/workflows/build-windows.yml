name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt pillow

      - name: Run tests
        run: pytest -q

      - name: Generate application icon
        run: python scripts/generate_icon.py

      - name: Build executable
        run: pyinstaller --noconfirm --clean HFStorage.spec

      - name: Create ZIP package
        shell: pwsh
        run: Compress-Archive -Path dist/HFStorage.exe -DestinationPath dist/HFStorage-Windows-x64.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HFStorage-Windows-x64
          path: |
            dist/HFStorage.exe
            dist/HFStorage-Windows-x64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/HFStorage.exe
            dist/HFStorage-Windows-x64.zip
