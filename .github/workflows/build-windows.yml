name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt pillow

      - name: Run tests
        run: pytest -q

      - name: Generate application icon
        run: python scripts/generate_icon.py

      - name: Build executable
        run: pyinstaller --noconfirm --clean HFStorage.spec

      - name: Create ZIP package
        shell: pwsh
        run: Compress-Archive -Path dist/HFStorage.exe -DestinationPath dist/HFStorage-Windows-x64.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HFStorage-Windows-x64
          path: |
            dist/HFStorage.exe
            dist/HFStorage-Windows-x64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Attach assets to manually published release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/HFStorage.exe
            dist/HFStorage-Windows-x64.zip

      - name: Publish HF Storage v0.1.0 release
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore(release):')) || (github.event_name == 'pull_request' && github.head_ref == 'release/v0.1.0')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v0.1.0
          RELEASE_TARGET: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.sha }}
        run: |
          @'
          ## HF Storage v0.1.0

          İlk Windows sürümü.

          ### Öne çıkanlar
          - Hugging Face read + write token ile güvenli giriş
          - Model, Dataset, Space ve Bucket depolarını tek panelden yönetme
          - Canlı depolama kullanımı ve kalan alan göstergesi
          - 100 dosyaya kadar tek commit kullanan batch upload
          - Dosya/klasör yükleme, indirme, taşıma ve yeniden adlandırma
          - LFS/Xet nesneleri için onaylı kalıcı silme
          - Windows DPAPI ile isteğe bağlı şifreli token saklama
          - Profesyonel koyu temalı Windows arayüzü

          Windows 10/11 x64 için `HFStorage.exe` dosyasını veya portable ZIP paketini indirebilirsiniz.
          '@ | Set-Content -Path release-notes.md -Encoding utf8

          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG dist/HFStorage.exe dist/HFStorage-Windows-x64.zip --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $env:RELEASE_TAG dist/HFStorage.exe dist/HFStorage-Windows-x64.zip --target $env:RELEASE_TARGET --title "HF Storage v0.1.0" --notes-file release-notes.md --repo $env:GITHUB_REPOSITORY
          }
