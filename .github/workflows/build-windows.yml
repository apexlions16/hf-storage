name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt pillow

      - name: Run tests
        run: pytest -q

      - name: Generate application icon
        run: python scripts/generate_icon.py

      - name: Build executable
        run: pyinstaller --noconfirm --clean HFStorage.spec

      - name: Create ZIP package
        shell: pwsh
        run: Compress-Archive -Path dist/HFStorage.exe -DestinationPath dist/HFStorage-Windows-x64.zip -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HFStorage-Windows-x64
          path: |
            dist/HFStorage.exe
            dist/HFStorage-Windows-x64.zip
          if-no-files-found: error
          retention-days: 30

      - name: Attach assets to manually published release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/HFStorage.exe
            dist/HFStorage-Windows-x64.zip

      - name: Publish HF Storage v0.1.1 release
        if: github.event_name == 'pull_request' && github.head_ref == 'fix/upload-v0.1.1'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: v0.1.1
          RELEASE_TARGET: ${{ github.event.pull_request.head.sha }}
        run: |
          @'
          ## HF Storage v0.1.1

          Dosya yükleme düzeltme sürümü.

          ### Düzeltilenler
          - Normal dosya, LFS ve Xet aktarımı doğrudan `create_commit` üzerinden yapılıyor
          - 100 dosya hâlâ tek batch commit olarak gönderiliyor
          - Windows EXE paketine `hf_xet` yerel çalışma dosyaları eksiksiz ekleniyor
          - Yükleme öncesinde depo yazma izni doğrulanıyor
          - 401, 403, 404, 413, 429, sunucu, SSL ve Xet hataları anlaşılır biçimde gösteriliyor
          - Ayrıntılı hata günlüğü `%LOCALAPPDATA%\HFStorage\logs\upload-errors.log` konumuna yazılıyor
          - Hugging Face telemetrisi kapatılıyor ve Xet ayarları importtan önce uygulanıyor

          Windows 10/11 x64 için `HFStorage.exe` dosyasını veya portable ZIP paketini indirebilirsiniz.
          '@ | Set-Content -Path release-notes.md -Encoding utf8

          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG dist/HFStorage.exe dist/HFStorage-Windows-x64.zip --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $env:RELEASE_TAG dist/HFStorage.exe dist/HFStorage-Windows-x64.zip --target $env:RELEASE_TARGET --title "HF Storage v0.1.1" --notes-file release-notes.md --repo $env:GITHUB_REPOSITORY
          }
