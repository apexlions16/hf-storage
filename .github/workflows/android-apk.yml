name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-apk.yml"
      - "PLATFORMS.md"
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android-apk.yml"
      - "PLATFORMS.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform and NDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.2.12479018"

      - name: Set up Rust for Android
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: android/xet-native
          cache-on-failure: true

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Build mandatory native Xet library
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
        run: |
          set -euxo pipefail
          rm -rf android/app/src/main/jniLibs
          cd android/xet-native
          cargo ndk \
            --target arm64-v8a \
            --target x86_64 \
            --platform 26 \
            --output-dir ../app/src/main/jniLibs \
            build --release 2>&1 | tee ../../xet-build.log
          cd ../..
          test -s android/app/src/main/jniLibs/arm64-v8a/libhfstorage_xet.so
          test -s android/app/src/main/jniLibs/x86_64/libhfstorage_xet.so
          find android/app/src/main/jniLibs -type f -name '*.so' -print -exec file {} \;

      - name: Package Android rustls verifier bridge
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf android/app/libs
          python android/scripts/prepare_rustls_platform_verifier.py
          test -s android/app/libs/rustls-platform-verifier.jar
          unzip -l android/app/libs/rustls-platform-verifier.jar | tee rustls-bridge-contents.txt
          grep -q 'org/rustls/platformverifier/.*\.class' rustls-bridge-contents.txt

      - name: Verify SELinux-safe Xet staging source
        shell: bash
        run: |
          set -euxo pipefail
          SOURCE=android/app/src/main/java/com/apexlions/hfstorage/mobile/data/UploadEngine.kt
          grep -q 'hf-storage-staging' "$SOURCE"
          grep -q 'output.fd.sync()' "$SOURCE"
          if grep -nE 'ParcelFileDescriptor|openSeekableDescriptor|paths[[:space:]]*\+=[[:space:]]*"/proc/self/fd' "$SOURCE"; then
            echo 'Unsafe /proc/self/fd upload path returned to Android source.' >&2
            exit 1
          fi

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Run Android unit tests
        shell: bash
        run: |
          set -o pipefail
          gradle -p android :app:testDebugUnitTest --stacktrace 2>&1 | tee android-build.log

      - name: Build installable APK
        shell: bash
        run: |
          set -o pipefail
          gradle -p android :app:assembleDebug --stacktrace 2>&1 | tee -a android-build.log

      - name: Verify Xet and Android verifier are packaged
        shell: bash
        run: |
          set -euxo pipefail
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          unzip -l "$APK" | tee apk-contents.txt
          grep -q 'lib/arm64-v8a/libhfstorage_xet.so' apk-contents.txt
          grep -q 'lib/x86_64/libhfstorage_xet.so' apk-contents.txt
          : > dex-strings.txt
          while IFS= read -r dex; do
            unzip -p "$APK" "$dex" | strings >> dex-strings.txt
          done < <(unzip -Z1 "$APK" | grep -E '^classes[0-9]*\.dex$')
          grep -q 'org/rustls/platformverifier' dex-strings.txt
          grep -q 'nativeInitialize' dex-strings.txt
          grep -q 'hf-storage-staging' dex-strings.txt

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-xet-build-diagnostics
          path: |
            xet-build.log
            android-build.log
            apk-contents.txt
            dex-strings.txt
            rustls-bridge-contents.txt
            android/app/libs/rustls-platform-verifier.jar
            android/xet-native/Cargo.lock
          if-no-files-found: warn
          retention-days: 7

      - name: Prepare release asset
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/HFStorage-Android-v0.1.3.apk
          sha256sum dist/HFStorage-Android-v0.1.3.apk > dist/HFStorage-Android-v0.1.3.apk.sha256

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HFStorage-Android-v0.1.3
          path: |
            dist/HFStorage-Android-v0.1.3.apk
            dist/HFStorage-Android-v0.1.3.apk.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish Android v0.1.3 release
        if: (github.event_name == 'pull_request' && github.head_ref == 'fix/android-selinux-staging-v0.1.3') || (github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'release(android):'))
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: android-v0.1.3
          RELEASE_TARGET: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          cat > android-release-notes.md <<'NOTES'
          ## HF Storage Android v0.1.3

          Samsung ve diğer sıkı SELinux politikalı Android cihazlarda Xet dosya okuma düzeltmesi.

          ### Düzeltilen hata
          - `/proc/self/fd/<n>` üzerinden Xet'e dosya verme yolu tamamen kaldırıldı.
          - `Permission denied (os error 13)` ile sonuçlanan OEM/SELinux uyumsuzluğu giderildi.
          - Her boş olmayan belge artık 1 MiB tamponla uygulamanın özel staging alanına akış halinde kopyalanır.
          - Xet yalnızca doğrulanmış normal dosya yolunu okur; dosya bütünüyle RAM'e alınmaz.
          - Staging için dahili ve harici uygulama cache alanlarından en fazla boş alana sahip olan seçilir.
          - Yetersiz boş alan olduğunda anlaşılır hata gösterilir; işlem sonrasında geçici dosyalar temizlenir.
          - Normal Git blobu gereken küçük dosyalar da aynı doğrulanmış staging kopyasından commit edilir.

          ### Korunan özellikler
          - Resmî `hf-xet` Rust çekirdeği zorunludur; Git LFS upload fallback'i yoktur.
          - Android rustls platform verifier başlangıcı korunur.
          - 100 dosyaya kadar tek Hugging Face commit davranışı korunur.
          - Okunabilir ve tokenı sansürlenmiş hata günlükleri `İndirilenler/HFStorage` içine aktarılır.

          APK GitHub Actions tarafından test edilmiş, staging regresyon kontrolünden geçirilmiş ve debug anahtarıyla imzalanmıştır.
          NOTES

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/HFStorage-Android-v0.1.3.apk dist/HFStorage-Android-v0.1.3.apk.sha256 --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" dist/HFStorage-Android-v0.1.3.apk dist/HFStorage-Android-v0.1.3.apk.sha256 \
              --target "$RELEASE_TARGET" \
              --title "HF Storage Android v0.1.3" \
              --notes-file android-release-notes.md \
              --repo "$GITHUB_REPOSITORY"
          fi
